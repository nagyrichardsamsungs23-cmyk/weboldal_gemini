                <a href="tel:+363****7052" class="header__nav-btn">📞 +36 30 361 7052</a>
            </nav>
        </div>

    <!-- ===== QUOTE HERO ===== -->
    <section class="quote-hero">
        <a href="index.html" class="hero-back">← Vissza</a>
        <div class="quote-hero__inner">
            <h1 class="quote-hero__title">Árajánlatkérés</h1>
            <p class="quote-hero__subtitle">
                Töltse ki az alábbi űrlapot és 24 órán belül felvesszük Önnel a kapcsolatot egy személyre szabott árajánlattal.
            </p>
        </div>
    </section>

    <!-- ===== QUOTE FORM ===== -->
    <section class="quote-form-section">
        <div class="quote-form-section__inner">
            <form class="quote-form" action="https://formspree.io/f/mredlnby" method="POST">
                
                <div class="quote-form__row">
                    <div class="quote-form__field">
                        <label class="quote-form__label" for="name">Teljes név *</label>
                        <input class="quote-form__input" type="text" id="name" name="name" placeholder="pl. Kovács István" required>
                    </div>
                    <div class="quote-form__field">
                        <label class="quote-form__label" for="email">Email cím *</label>
                        <input class="quote-form__input" type="email" id="email" name="email" placeholder="pl. kovacs.istvan@email.hu" required>
                    </div>
                </div>

                <div class="quote-form__row">
                    <div class="quote-form__field">
                        <label class="quote-form__label" for="phone">Telefonszám *</label>
                        <input class="quote-form__input" type="tel" id="phone" name="phone" placeholder="pl. +36 30 123 4567" required>
                    </div>
                    <div class="quote-form__field">
                        <label class="quote-form__label" for="service">Milyen szolgáltatás érdekli?</label>
                        <select class="quote-form__input quote-form__select" id="service" name="service">
                            <option value="">-- Válasszon --</option>
                            <option value="villanyszereles">Villanyszerelés</option>
                            <option value="klimaszereles">Klímaszerelés</option>
                            <option value="okosotthon">Okosotthon</option>
                            <option value="napelem">Napelem szerelés</option>
                            <option value="hoszivattyu">Hőszivattyú</option>
                            <option value="biztonsagtechnika">Biztonságtechnika</option>
                            <option value="egyeb">Egyéb</option>
                        </select>
                    </div>
                </div>

                <div class="quote-form__field quote-form__field--full">
                    <label class="quote-form__label" for="message">Üzenet (opcionális)</label>
                    <textarea class="quote-form__input quote-form__textarea" id="message" name="message" placeholder="Írja le röviden, milyen munkára lenne szüksége..."></textarea>
                </div>

                <button type="submit" class="quote-form__submit">Árajánlat kérése</button>
            </form>
        </div>
    </section>

    <footer class="footer">
